<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Motlatsi AI</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#0056b3" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&family=Gloria+Hallelujah&family=Epilogue:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Lexend', 'sans-serif'],
              display: ['Epilogue', 'sans-serif'],
              chalk: ['"Gloria Hallelujah"', 'cursive'],
            },
            colors: {
              teacherBlue: '#0056b3',
              growthGreen: '#28a745',
              basothoBlanketRed: '#c1272d',
              lesothoBlue: '#00205b',
              chalkboard: '#1a472a',
              primary: '#eca413', 
              'background-light': '#f8f7f6',
              'background-dark': '#221c10',
            },
            padding: {
              'safe': 'env(safe-area-inset-bottom)',
              'safe-top': 'env(safe-area-inset-top)',
            }
          }
        }
      }
    </script>
    <style>
      /* Mobile App Reset */
      html, body {
        height: 100%;
        overflow: hidden; /* Let the app container handle scroll */
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        user-select: none; /* Prevent text selection like a native app */
        -webkit-user-select: none;
      }
      
      /* Allow text selection only on inputs and specific text areas if needed */
      input, textarea, [contenteditable="true"] {
        user-select: text;
        -webkit-user-select: text;
      }

      #root {
        height: 100%;
        display: flex;
        flex-direction: column;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      .chalk-effect {
        filter: drop-shadow(1px 1px 0px rgba(255,255,255,0.3));
      }
      .dyslexic-mode, .dyslexic-mode * {
          letter-spacing: 0.15em !important;
          word-spacing: 0.3em !important;
          line-height: 1.8 !important;
          font-family: 'Lexend', sans-serif !important;
      }
      .flashcard-shadow {
          box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      }
      .ios-shadow {
          box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05), 0 2px 8px -2px rgba(0, 0, 0, 0.03);
      }
      
      /* Utility for hiding scrollbar but allowing scroll */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
    </style>

</head>
  <body class="bg-background-light text-slate-900">
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
